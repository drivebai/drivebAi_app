# fly.toml app configuration file generated for drivebai-api on 2026-02-09T13:19:29+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'drivebai-api-team'
primary_region = 'ewr'

[build]

[env]
  UPLOAD_DIR = "/data/uploads"
  ENV = "production"
  # Static, non-secret knobs. Sensitive overrides go through `fly secrets set`
  # (UPLOAD_URL_SECRET, CORS_ALLOWED_ORIGINS, STRIPE_*, APNS_AUTH_KEY_P8,
  # APPLE_TEAM_ID, APNS_KEY_ID).
  PICKUP_DEADLINE_MINUTES = "120"
  PICKUP_EXPIRY_SCAN_INTERVAL_SECONDS = "60"
  REQUIRE_PRIVATE_UPLOAD_SIGNATURES = "true"
  UPLOAD_URL_TTL = "1h"
  # iOS bundle ID — public, not secret. Lives here so the APNs send loop has
  # a topic to claim without needing a separate fly secrets set step.
  IOS_BUNDLE_ID = "com.drivebai.DriveBai"
  # APNS_SANDBOX flips the default APNs host used when the iOS client sent
  # `sandbox=false` (Release builds). Per-token sandbox flag stored in DB
  # is the authoritative router; this env is the default fallback.
  APNS_SANDBOX = "false"

[mounts]
  source = "drivebai_uploads"
  destination = "/data/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
