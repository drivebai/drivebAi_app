# Fly.io app config for the DriveBai admin panel.
#
# Static SPA served by nginx. No volume, no DB, no secrets — the only
# thing that varies between deploys is the API base URL baked into the
# bundle via the Dockerfile build-arg (defaults to drivebai-api-team).

app = 'drivebai-admin-team'
primary_region = 'ewr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "get"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpus = 1
  cpu_kind = 'shared'
