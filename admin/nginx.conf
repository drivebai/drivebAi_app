# nginx config for the DriveBai admin SPA.
#   - SPA fallback (try_files → /index.html) so refreshing /dashboard,
#     /users/<uuid>, etc. doesn't 404.
#   - Long-cache for hashed Vite assets under /assets/* (filenames embed
#     their content hash, so they can be immutable).
#   - Short / no cache for the HTML shell so a re-deploy lands instantly.
#   - Basic gzip; CSS/JS/JSON benefit, images aren't worth it.

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript text/xml application/json
        application/javascript application/xml+rss application/xhtml+xml
        image/svg+xml font/ttf font/otf font/woff font/woff2;

    # Hashed Vite assets: cache hard. The hash in the filename invalidates them.
    location /assets/ {
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fly health checks hit this; respond fast and don't log.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: any path the file system doesn't resolve becomes index.html.
    # Important: this serves the FRESH index.html on every navigation, which
    # is what we want — otherwise a redeploy wouldn't load until the user
    # hard-refreshes.
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }
}
